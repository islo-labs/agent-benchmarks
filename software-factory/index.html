<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Benchmark your software engineering process and SDLC for AI-driven agent maturity. Compare against hundreds of teams and share your result." />
    <meta name="theme-color" content="#7a3de6" />

    <meta property="og:site_name" content="Agent Benchmarks" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://agent-benchmarks.com/software-factory/" />
    <meta property="og:title" content="Software Factory Grader" />
    <meta property="og:description" content="Benchmark your AI-driven software engineering maturity against 200+ teams. Grade your SDLC in 9 questions." />
    <meta property="og:image" content="https://agent-benchmarks.com/software-factory/og-share.png" />
    <meta property="og:image:secure_url" content="https://agent-benchmarks.com/software-factory/og-share.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Software Factory Grader — benchmark your AI-driven software engineering maturity" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Software Factory Grader" />
    <meta name="twitter:description" content="Benchmark your AI-driven software engineering maturity against 200+ teams. Grade your SDLC in 9 questions." />
    <meta name="twitter:image" content="https://agent-benchmarks.com/software-factory/og-share.png" />
    <meta name="twitter:image:alt" content="Software Factory Grader — benchmark your AI-driven software engineering maturity" />

    <title>Software Factory Grader</title>
    <script>
      (function () {
        var params = new URLSearchParams(location.search)
        var grade = params.get('g')
        var score = params.get('s')
        var maturityLevel = params.get('ml')
        var maturityLabel = params.get('mlb')
        var percentile = params.get('p')
        if (!grade || !score) return

        var title = 'Grade ' + grade + ': ' + score + '/100 on AI-driven software factory maturity'
        var description = 'Our team scored ' + score + '/100 (Grade ' + grade + ') on AI-driven software factory maturity.'
        if (maturityLevel && maturityLabel) {
          description += ' Level ' + maturityLevel + ': ' + decodeURIComponent(maturityLabel) + '.'
        }
        if (percentile) {
          description += ' ' + percentile + 'th percentile vs 200+ benchmarked teams.'
        }

        document.title = title
        function setMeta(selector, value) {
          var tag = document.querySelector(selector)
          if (tag) tag.setAttribute('content', value)
        }
        setMeta('meta[property="og:title"]', title)
        setMeta('meta[property="og:description"]', description)
        setMeta('meta[name="twitter:title"]', title)
        setMeta('meta[name="twitter:description"]', description)
      })()
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,400;0,500;0,600;0,700;1,500&family=JetBrains+Mono:wght@500&family=Fraunces:ital,wght@1,400;1,500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
