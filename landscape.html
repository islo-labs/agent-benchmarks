<!DOCTYPE html>
<html lang="en">
<head>

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {

      --p50:       #f5f3ff;

      --text:      #18181B;
      --muted:     #71717A;
      --faint:     #A1A1AA;
      --bg:        #FAFAFA;
      --white:     #FFFFFF;
      --max:       1080px;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--white);
      color: var(--text);
      line-height: 1.6;
    }

    a { text-decoration: none; color: inherit; }

    /* ── nav ── */
    nav {
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-inner {
      max-width: var(--max);
      margin: 0 auto;
      padding: 0 32px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-brand { font-size: 13px; font-weight: 700; color: var(--purple); letter-spacing: -.01em; }
    .nav-link  { font-size: 13px; font-weight: 500; color: var(--faint); transition: color .15s; }
    .nav-link:hover { color: var(--text); }

    /* ── hero ── */
    .hero {
      padding: 80px 32px 64px;
      border-bottom: 1px solid var(--border);
    }
    .hero-inner { max-width: var(--max); margin: 0 auto; }

    .eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--purple);
      margin-bottom: 20px;
    }

    h1 {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: clamp(36px, 5vw, 52px);
      font-weight: 400;
      line-height: 1.08;
      letter-spacing: -.02em;
      color: var(--text);
      margin-bottom: 16px;
    }
    h1 i { color: var(--purple-lt); font-style: italic; }

    .hero-sub {
      font-size: 16px;
      color: var(--muted);
      line-height: 1.65;
      max-width: 440px;
      margin-bottom: 40px;
    }

    .stats {
      display: flex;
      gap: 40px;
    }
    .stat-num {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -.04em;
      color: var(--text);
      display: block;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .stat-lbl {
      font-size: 11px;
      font-weight: 500;
      color: var(--faint);
      display: block;
      margin-top: 5px;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    /* ── filter bar ── */
    .filter-bar {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 48px;
      z-index: 50;
    }
    .filter-inner {
      max-width: var(--max);
      margin: 0 auto;
      padding: 0 32px;
      display: flex;
      align-items: center;
      gap: 2px;
      overflow-x: auto;
      scrollbar-width: none;
      height: 44px;
    }
    .filter-inner::-webkit-scrollbar { display: none; }

    .fsep { width: 1px; height: 14px; background: var(--border); flex-shrink: 0; margin: 0 5px; }

    .ftag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 5px;
      border: 1px solid transparent;
      background: transparent;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: all .12s;
    }
    .ftag:hover { background: var(--bg); border-color: var(--border); color: var(--text); }
    .ftag.active { background: var(--p50); border-color: var(--p200); color: var(--purple); font-weight: 600; }

    .search-box {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }
    .search-box svg { color: var(--faint); flex-shrink: 0; }
    #search {
      font-size: 12px; color: var(--text);
      background: transparent; border: none; outline: none; width: 130px;
    }
    #search::placeholder { color: var(--faint); }

    /* ── landscape ── */
    .landscape-wrap {
      max-width: var(--max);
      margin: 0 auto;
      padding: 48px 32px 96px;
    }

    .cat-section { margin-bottom: 52px; }

    .cat-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
    }
    .cat-header-name {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--faint);
      white-space: nowrap;
    }
    .cat-header-line { flex: 1; height: 1px; background: var(--border); }
    .cat-header-count { font-size: 11px; color: var(--faint); white-space: nowrap; }

    /* card grid */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
    }

    /* card */
    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px 20px 16px;
      text-decoration: none;
      color: var(--text);
      display: flex;
      flex-direction: column;
      transition: border-color .15s, box-shadow .15s, opacity .22s ease, transform .22s ease;
      opacity: 0;
      transform: translateY(6px);
    }
    .card.visible { opacity: 1; transform: translateY(0); }
    .card:hover {
      border-color: var(--p200);
      box-shadow: 0 2px 20px rgba(124,58,237,.07);
    }

    .card-kind {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .09em;
      text-transform: uppercase;
      color: var(--faint);
      margin-bottom: 10px;
    }

    .card-name {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 19px;
      font-style: italic;
      font-weight: 400;
      line-height: 1.2;
      letter-spacing: -.01em;
      color: var(--text);
      flex: 1;
    }

    .card-divider {
      height: 1px;
      background: var(--border);
      margin: 16px 0 12px;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .card-cat {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
    }

    .card-sat {
      font-size: 11px;
      font-weight: 500;
      color: var(--faint);
      font-variant-numeric: tabular-nums;
    }
    .card-sat.sat-low    { color: #16a34a; }
    .card-sat.sat-full   { color: #dc2626; }
    .card-sat.sat-almost { color: #ea580c; }
    .card-sat.sat-somewhat { color: #ca8a04; }

    /* ── empty / footer ── */
    .empty { padding: 80px 0; text-align: center; font-size: 14px; color: var(--faint); }

    footer { border-top: 1px solid var(--border); }
    .footer-inner {
      max-width: var(--max); margin: 0 auto;
      padding: 20px 32px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .footer-l { font-size: 12px; font-weight: 600; color: var(--purple); }
    .footer-r { font-size: 12px; color: var(--faint); }
    .footer-r a { color: var(--purple); }
    .footer-r a:hover { text-decoration: underline; }

    @media (max-width: 760px) {
      h1 { font-size: 32px; }
      .stats { gap: 24px; }
      .cards { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; }
      .card-name { font-size: 16px; }
    }
  </style>
</head>

<script>

let fCat='all', fType='all', fSat='all', fQ='';
let animTimer = null;

function matches(b) {
  if (fCat !== 'all' && b.cat !== fCat) return false;
  if (fType !== 'all' && b.type !== fType) return false;
  if (fSat !== 'all' && b.sat !== fSat) return false;
  if (fQ) {
    const q = fQ.toLowerCase();
    if (!b.name.toLowerCase().includes(q) && !b.tags.toLowerCase().includes(q)) return false;
  }
  return true;
}

function doRender() {
  const wrap = document.getElementById('landscape');
  let html = '', total = 0;

  for (const cat of CATS) {
    const items = BENCHMARKS.filter(b => b.cat === cat.key && matches(b));
    if (!items.length) continue;
    total += items.length;

    html += `<div class="cat-section">
      <div class="cat-header">
        <span class="cat-header-name">${cat.label}</span>
        <div class="cat-header-line"></div>
        <span class="cat-header-count">${items.length}</span>
      </div>
      <div class="cards">`;

    items.forEach(b => {
      html += `<a class="card" href="${b.link}" target="_blank" rel="noopener">
        <div class="card-kind">${TYPE_LABEL[b.type] || b.type}</div>
        <div class="card-name">${b.name}</div>
        <div class="card-divider"></div>
        <div class="card-footer">
          <span class="card-cat">${cat.label}</span>
          <span class="card-sat sat-${b.sat}">${SAT_LABEL[b.sat] || '—'}</span>
        </div>
      </a>`;
    });

    html += `</div></div>`;
  }

  if (!total) html = `<div class="empty">No benchmarks match your filters.</div>`;
  wrap.innerHTML = html;
  document.getElementById('total-count').textContent = total;

  requestAnimationFrame(() => {
    wrap.querySelectorAll('.card').forEach((card, i) => {
      setTimeout(() => card.classList.add('visible'), i * 20);
    });
  });
}

function render() {
  const existing = document.querySelectorAll('#landscape .card');
  if (!existing.length) { doRender(); return; }
  existing.forEach(c => c.classList.remove('visible'));
  clearTimeout(animTimer);
  animTimer = setTimeout(doRender, 180);
}

document.querySelectorAll('[data-cat]').forEach(el => el.addEventListener('click', () => {
  document.querySelectorAll('[data-cat]').forEach(x => x.classList.remove('active'));
  el.classList.add('active'); fCat = el.dataset.cat; render();
}));
document.querySelectorAll('[data-type]').forEach(el => el.addEventListener('click', () => {
  document.querySelectorAll('[data-type]').forEach(x => x.classList.remove('active'));
  el.classList.add('active'); fType = el.dataset.type; render();
}));
document.querySelectorAll('[data-sat]').forEach(el => el.addEventListener('click', () => {
  document.querySelectorAll('[data-sat]').forEach(x => x.classList.remove('active'));
  el.classList.add('active'); fSat = el.dataset.sat; render();
}));
document.getElementById('search').addEventListener('input', e => { fQ = e.target.value.trim(); render(); });

function countUp(el, target, duration) {
  const start = performance.now();
  (function step(now) {
    const t = Math.min((now - start) / (duration || 700), 1);
    el.textContent = Math.round((1 - Math.pow(1 - t, 3)) * target);
    if (t < 1) requestAnimationFrame(step);
  })(start);
}

countUp(document.getElementById('total-count'),   BENCHMARKS.length, 800);
countUp(document.getElementById('agentic-count'), BENCHMARKS.filter(b => b.type === 'agentic').length, 700);
countUp(document.getElementById('unsat-count'),   BENCHMARKS.filter(b => b.sat === 'low').length, 600);

render();
</script>
</body>
</html>
